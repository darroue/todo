service: todo

image: petr-radous/todo/web

servers:
  web:
    - dn6

registry:
  server: localhost:5000

proxy:
  ssl: true
  host: todo.petr-radous.cz
  app_port: 8000

builder:
  arch: amd64
  args:
    VITE_REVERB_APP_KEY: e3J6FGyMsVunas
    VITE_REVERB_HOST: todo.petr-radous.cz
    VITE_REVERB_PORT: 443
    VITE_REVERB_SCHEME: https

env:
  clear:
    APP_NAME: Todo
    APP_ENV: production
    APP_DEBUG: "false"
    APP_URL: https://todo.petr-radous.cz
    LOG_CHANNEL: stderr
    LOG_LEVEL: error
    DB_CONNECTION: pgsql
    DB_HOST: todo-postgres
    DB_PORT: "5432"
    DB_DATABASE: todo_production
    DB_USERNAME: todo_user
    SESSION_DRIVER: database
    SESSION_LIFETIME: "120"
    QUEUE_CONNECTION: database
    CACHE_STORE: database
    FILESYSTEM_DISK: gcs
    GCS_BUCKET: todo_petr-radous
    GCS_PROJECT_ID: petr-radous
    MAIL_MAILER: smtp
    MAIL_HOST: smtp.forpsi.com
    MAIL_PORT: "587"
    MAIL_ENCRYPTION: tls
    MAIL_FROM_ADDRESS: info@petr-radous.cz
    MAIL_FROM_NAME: Todo App
    MAIL_USERNAME: info@petr-radous.cz
    BROADCAST_CONNECTION: reverb
    REVERB_HOST: todo.petr-radous.cz
    REVERB_PORT: 443
    REVERB_SCHEME: https
    REVERB_APP_ID: 87654321
  secret:
    - APP_KEY
    - DB_PASSWORD
    - MAIL_PASSWORD
    - REVERB_APP_KEY
    - REVERB_APP_SECRET
    - GCS_CREDENTIALS

volumes:
  - todo-storage:/var/www/html/storage/app

accessories:
  postgres:
    image: postgres:17.6-alpine
    host: dn6
    env:
      clear:
        PGDATA: /var/lib/postgresql/data_persistent
        POSTGRES_USER: todo_user
        POSTGRES_DB: todo_production
      secret:
        - POSTGRES_PASSWORD
    volumes:
      - todo-data:/var/lib/postgresql/data_persistent
